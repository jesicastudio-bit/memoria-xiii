<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=no">
    <title>Yearbook Memoria XIII</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* --- Latar Belakang Tekstur SVG (Hitam & Merah Tua) --- */
        body {
            background-color: #000000;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%238B0000' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E");
            overflow: hidden; 
            margin: 0;
            padding: 0;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            color: #f8fafc;
            overscroll-behavior-y: none;
            
            /* ANTI-THEFT: Mencegah seleksi teks dan klik tahan di HP */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* --- Area Utama --- */
        main {
            flex-grow: 1;
            position: relative;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            touch-action: none; 
        }

        /* --- MODE FLIPBOOK 3D --- */
        #flipbook-wrapper {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: default;
        }
        
        #flipbook-wrapper.can-pan { cursor: grab; }
        #flipbook-wrapper.is-panning { cursor: grabbing; }

        #book-zoom-wrapper {
            transition: transform 0.1s ease-out;
            transform-origin: center center;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            will-change: transform;
            transform-style: flat; 
        }
        
        #book-zoom-wrapper.dragging {
            transition: none !important; 
        }

        .book-container {
            position: relative;
            perspective: 3000px; 
            margin: 0 auto;
        }

        .book {
            position: absolute;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            border-radius: 4px;
        }

        .dynamic-shadow {
            position: absolute;
            top: 5%; bottom: -5%;
            background: rgba(0, 0, 0, 0.7);
            filter: blur(15px);
            z-index: -2;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1), opacity 0.5s ease;
            will-change: width, opacity;
        }

        #shadow-left { right: 50%; width: 0%; border-radius: 50% 0 0 50%; }
        #shadow-right { left: 50%; width: 45%; border-radius: 0 50% 50% 0; }

        .book-thickness {
            position: absolute;
            top: 1%;
            height: 98%;
            background: repeating-linear-gradient(to right, #d1d5db, #d1d5db 1px, #9ca3af 1px, #9ca3af 2px);
            z-index: -1;
            transition: width 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }

        #thickness-left { right: 50%; width: 0px; border-radius: 8px 0 0 8px; transform: translateZ(-2px); }
        #thickness-right { left: 50%; width: 20px; border-radius: 0 8px 8px 0; transform: translateZ(-2px); }

        .leaf {
            position: absolute;
            top: 0; left: 50%; width: 50%; height: 100%;
            transform-origin: left center;
            transition: transform 1s cubic-bezier(0.645, 0.045, 0.355, 1), z-index 0.01s;
            transform-style: preserve-3d;
            -webkit-transform-style: preserve-3d; 
            cursor: pointer;
            display: none; 
        }

        .leaf.flipped { transform: rotateY(-180deg); }

        .face {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            backface-visibility: hidden;
            -webkit-backface-visibility: hidden; 
            background-color: #f8fafc;
            overflow: hidden;
            border: 1px solid #4b5563;
            display: block; 
        }

        .face.front { 
            transform: rotateY(0deg) translateZ(0.5px); 
            -webkit-transform: rotateY(0deg) translateZ(0.5px);
            border-radius: 0 8px 8px 0; 
        }
        .face.back { 
            transform: rotateY(180deg) translateZ(0.5px); 
            -webkit-transform: rotateY(180deg) translateZ(0.5px);
            border-radius: 8px 0 0 8px; 
        }

        .face img.page-img {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            object-fit: fill; 
            background-color: #ffffff; 
            pointer-events: none; 
            border-radius: inherit;
            -webkit-user-drag: none; 
        }

        .face::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, rgba(0,0,0,0.5) 0%, rgba(255,255,255,0.1) 20%, rgba(255,255,255,0) 100%);
            opacity: 0; transition: opacity 0.5s ease;
            pointer-events: none; z-index: 10;
        }

        .leaf.is-turning .face.front::before { opacity: 1; }
        .leaf.is-turning .face.back::before { opacity: 1; background: linear-gradient(-90deg, rgba(0,0,0,0.5) 0%, rgba(255,255,255,0.1) 20%, rgba(255,255,255,0) 100%); }

        .spine {
            position: absolute;
            top: 0; left: calc(50% - 15px); width: 30px; height: 100%;
            background: linear-gradient(to right, #374151 0%, #9ca3af 20%, #d1d5db 50%, #9ca3af 80%, #111827 100%);
            z-index: 0; border-radius: 4px;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.7);
        }

        /* --- UI Components --- */
        .hidden { display: none !important; }

        .floating-toolbar {
            position: fixed;
            bottom: max(15px, env(safe-area-inset-bottom));
            left: 50%; 
            transform: translateX(-50%) translateZ(0);
            -webkit-transform: translateX(-50%) translateZ(0);
            z-index: 50; 
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            will-change: transform, opacity;
        }

        .toolbar-hidden {
            transform: translate(-50%, 150%) translateZ(0) !important;
            -webkit-transform: translate(-50%, 150%) translateZ(0) !important;
            opacity: 0;
            pointer-events: none;
        }

        .side-btn {
            position: absolute; top: 50%; transform: translateY(-50%) translateZ(0);
            z-index: 40; cursor: pointer;
            opacity: 0.2; transition: all 0.3s ease;
            padding: 30px; border-radius: 20px;
        }
        
        .side-btn:hover { opacity: 1; background: rgba(139,0,0,0.4); backdrop-filter: blur(5px); }
        .side-btn:active { transform: translateY(-50%) scale(0.9) translateZ(0); }
        .side-btn.left { left: 2%; }
        .side-btn.right { right: 2%; }

        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px;
            background: #D4AF37; /* Gold */
            border-radius: 50%; cursor: pointer;
            box-shadow: 0 0 5px rgba(0,0,0,0.8);
        }

        .texture-btn.active {
            border-color: #D4AF37;
            box-shadow: 0 0 0 2px rgba(212, 175, 55, 0.4);
            background-color: #3f0000; /* Aksen Dark Red saat aktif */
        }

        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #000000; border-radius: 4px; border: 1px solid #333;}
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #8B0000; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #D4AF37; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        #magnifier-lens {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 3px solid #D4AF37; /* Gold */
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.8), inset 0 0 10px rgba(0,0,0,0.5);
            pointer-events: none;
            background-repeat: no-repeat;
            background-color: white;
            z-index: 9999;
            transform: translate(-50%, -50%); 
            display: none;
            transition: opacity 0.2s ease;
        }
        .magnifier-active { cursor: crosshair !important; }
        .magnifier-active .leaf { cursor: crosshair !important; }
        
        .thumb-img {
            width: 80px; 
            height: 110px;
            object-fit: cover;
            object-position: top;
            background-color: #fff;
        }
        @media (min-width: 768px) {
            .thumb-img { width: 100px; height: 140px; }
        }

        /* --- TOC Sidebar (Daftar Isi) --- */
        #toc-sidebar {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>
<body class="font-sans" oncontextmenu="return false;">

    <main id="main-area">

        <audio id="bgm-player" loop></audio>

        <audio id="sfx-player" src="audio/turn.mp3" preload="auto"></audio>

        <!-- Layar Memuat (Loading) -->
        <div id="loading-screen" class="absolute inset-0 z-[100] flex items-center justify-center bg-black bg-cover bg-center" style="background-image: url('img/SPLASH SCREEN.jpg');">

            </button>

            <!-- TOOLBAR BAWAH FLIPBOOK -->
            <div id="main-toolbar" class="floating-toolbar bg-black bg-opacity-80 backdrop-blur-lg px-2 sm:px-4 py-2 sm:py-3 rounded-full flex items-center space-x-1 sm:space-x-2 border border-[#8B0000] max-w-[95vw] overflow-x-auto no-scrollbar">
                
                <button id="btn-hide-toolbar" class="text-gray-400 hover:text-[#D4AF37] hover:bg-[#8B0000] px-3 h-8 sm:h-10 rounded-full transition flex items-center justify-center flex-shrink-0" title="Sembunyikan Menu">

                <button id="btn-home-flip" class="text-[#D4AF37] hover:text-white hover:bg-[#8B0000] px-3 sm:px-4 h-8 sm:h-10 rounded-full transition flex items-center justify-center flex-shrink-0" title="Kembali ke Sampul Depan">

                <button id="btn-prev" class="text-gray-400 hover:text-[#D4AF37] hover:bg-[#8B0000] w-8 h-8 sm:w-10 sm:h-10 rounded-full transition flex items-center justify-center disabled:opacity-30 flex-shrink-0">

                <div class="flex items-center justify-center font-mono text-gray-200 text-xs sm:text-sm bg-[#0a0000] border border-gray-600 px-2 py-1 rounded-md transition focus-within:border-[#D4AF37] flex-shrink-0">
                    <input type="number" id="page-input" min="1" value="1" class="w-6 sm:w-8 bg-transparent text-center outline-none text-[#D4AF37] font-bold">

                <button id="btn-next" class="text-gray-400 hover:text-[#D4AF37] hover:bg-[#8B0000] w-8 h-8 sm:w-10 sm:h-10 rounded-full transition flex items-center justify-center disabled:opacity-30 flex-shrink-0">

                    <i class="fas fa-music"></i>

                    <i class="fas fa-palette"></i>

                    <i class="fas fa-expand fs-icon"></i>

            <button id="btn-reset-view" class="fixed top-6 right-6 bg-[#8B0000] bg-opacity-90 backdrop-blur-md text-[#D4AF37] rounded-full px-4 py-2 sm:px-5 sm:py-3 flex items-center justify-center z-50 shadow-[0_0_15px_rgba(139,0,0,0.8)] border border-[#D4AF37] transition-all duration-300 opacity-0 pointer-events-none transform -translate-y-5 hover:bg-red-900 hover:scale-105" title="Kembali ke Tengah">
                <i class="fas fa-compress-arrows-alt"></i>
                <span class="ml-2 text-sm font-bold hidden sm:block">Tengah</span>
            </button>

    </main>

    <script>
        // Mencegah Klik Kanan Pada Dokumen untuk Keamanan Asset
        document.addEventListener('contextmenu', event => event.preventDefault());

        const TOTAL_PAGES = 72;
        const IMG_FOLDER = 'pages/';
        
        let totalLeaves = Math.ceil(TOTAL_PAGES / 2);
        let currentLeaf = 0; 
        let isFlipping = false;

        let currentZoom = 1.0;
        const ZOOM_STEP = 0.1;
        const MAX_ZOOM = 3.0;
        const MIN_ZOOM = 0.5;
        let isPanning = false;
        let hasDragged = false; 
        let startX, startY;
        let translateX = 0, translateY = 0;

        let autoPlayInterval = null;
        let isAutoPlaying = false;
        let isMagnifierMode = false;

        let sfxVolume = 0.8;
        let bgmVolume = 0.25;
        const bgmPlayer = document.getElementById('bgm-player');
        const sfxPlayer = document.getElementById('sfx-player');
        let isAudioInitiated = false;
        let isMuted = false;

        const loadingScreen = document.getElementById('loading-screen');
        const flipbookWrapper = document.getElementById('flipbook-wrapper');
        const bookEl = document.getElementById('book');
        const bookZoomWrapper = document.getElementById('book-zoom-wrapper');
        const bookContainer = document.getElementById('main-book-container');
        
        const thicknessLeft = document.getElementById('thickness-left');
        const thicknessRight = document.getElementById('thickness-right');
        const shadowLeft = document.getElementById('shadow-left');
        const shadowRight = document.getElementById('shadow-right');
        const progressBar = document.getElementById('progress-bar');
        
        const btnPrev = document.getElementById('btn-prev');
        const btnNext = document.getElementById('btn-next');
        const sidePrev = document.getElementById('side-prev');
        const sideNext = document.getElementById('side-next');
        const pageInput = document.getElementById('page-input');
        const pageTotal = document.getElementById('page-total');
        const zoomIndicator = document.getElementById('zoom-indicator');
        const btnHomeFlip = document.getElementById('btn-home-flip');
        
        const btnSoundMenu = document.getElementById('btn-sound-menu');
        const soundSettingsPanel = document.getElementById('sound-settings-panel');
        const btnCloseSoundSettings = document.getElementById('close-sound-settings');
        const sfxSlider = document.getElementById('sfx-slider');
        const bgmSlider = document.getElementById('bgm-slider');
        const sfxIcon = document.getElementById('sfx-icon');
        const bgmIcon = document.getElementById('bgm-icon');
        const bgmSelect = document.getElementById('bgm-select');

        const btnMute = document.getElementById('btn-mute');
        const muteIcon = document.getElementById('mute-icon');

        const btnAutoPlay = document.getElementById('btn-autoplay');
        const autoplayIcon = document.getElementById('autoplay-icon');
        const btnMagnifier = document.getElementById('btn-magnifier');
        const magnifierLens = document.getElementById('magnifier-lens');
        
        const btnTheme = document.getElementById('btn-theme');
        const bgSettingsPanel = document.getElementById('bg-settings-panel');
        const btnCloseBgSettings = document.getElementById('close-bg-settings');
        const bgColorPicker = document.getElementById('bg-color-picker');
        const bgColorHex = document.getElementById('bg-color-hex');
        const textureBtns = document.querySelectorAll('.texture-btn');
        
        const btnThumbnails = document.getElementById('btn-thumbnails');
        const thumbnailDrawer = document.getElementById('thumbnail-drawer');
        const thumbnailContainer = document.getElementById('thumbnail-container');
        const btnCloseThumbnails = document.getElementById('close-thumbnails');

        const btnHideToolbar = document.getElementById('btn-hide-toolbar');
        const btnShowToolbar = document.getElementById('btn-show-toolbar');
        const mainToolbar = document.getElementById('main-toolbar');
        let isToolbarVisible = true;
        
        const btnResetView = document.getElementById('btn-reset-view');
        const pageNameIndicator = document.getElementById('page-name-indicator');

        // LOGIKA SIDEBAR DAFTAR ISI (TOC)
        const btnTocOpen = document.getElementById('btn-toc-open');
        const tocSidebar = document.getElementById('toc-sidebar');
        const tocOverlay = document.getElementById('toc-overlay');
        const btnTocClose = document.getElementById('btn-toc-close');
        
        // MAPPING HALAMAN UNTUK INDIKATOR NAMA
        const sectionMapping = [
            { page: 1, name: "Cover" },
            { page: 6, name: "Sambutan" },
            { page: 8, name: "Teachers" },
            { page: 20, name: "Committee" },
            { page: 22, name: "Kelas VI-A" },
            { page: 36, name: "Kelas VI-B" },
            { page: 50, name: "Kelas VI-C" },
            { page: 64, name: "Sponsorships" }
        ];

        function toggleToc() {
            tocSidebar.classList.toggle('-translate-x-full');
            tocOverlay.classList.toggle('hidden');
        }

        btnTocOpen.addEventListener('click', toggleToc);
        btnTocClose.addEventListener('click', toggleToc);
        tocOverlay.addEventListener('click', toggleToc);

        document.querySelectorAll('.toc-link').forEach(link => {
            link.addEventListener('click', (e) => {
                const page = parseInt(e.currentTarget.dataset.page);
                // PERBAIKAN: Menggunakan Math.floor(page / 2) agar presisi untuk halaman ganjil & genap
                goToLeaf(Math.floor(page / 2));
                toggleToc();
            });
        });

        function getPageFilename(num) {
            return `page_${String(num).padStart(3, '0')}.webp`;
        }

        window.addEventListener('DOMContentLoaded', () => {
            bgmPlayer.src = bgmSelect.value;
            bgmPlayer.load(); // Paksa browser/WebView memuat data audio segera
            pageTotal.innerText = `/ ${TOTAL_PAGES}`;
            
            const firstImg = new Image();
            firstImg.src = IMG_FOLDER + getPageFilename(1);
            firstImg.onload = () => {
                const bookAspectRatio = (firstImg.naturalWidth * 2) / firstImg.naturalHeight;
                bookContainer.style.aspectRatio = bookAspectRatio.toString();
                
                progressBar.style.width = '50%'; 
                
                buildFlipbookDOM();
                
                setTimeout(() => {
                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        loadingScreen.classList.add('hidden');
                        flipbookWrapper.classList.remove('hidden');
                        btnTocOpen.classList.remove('hidden');
                        updateBookSize();
                    }, 500);
                }, 500);
            };
            
            firstImg.onerror = () => {
                alert("Gagal load gambar pertama. Pastikan folder 'pages' ada dan format filenya page_001.webp");
                bookContainer.style.aspectRatio = "1.5";
                buildFlipbookDOM();
                loadingScreen.classList.add('hidden');
                flipbookWrapper.classList.remove('hidden');
                btnTocOpen.classList.remove('hidden');
            };
        });

        // PERBAIKAN INISIASI AUDIO (Mobile Friendly & Anti-Blokir WebView)
        function initAudioOnFirstInteraction() {
            if (!isAudioInitiated && !isMuted) {
                bgmPlayer.volume = bgmVolume;
                let playPromise = bgmPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        isAudioInitiated = true;
                        muteIcon.className = 'fas fa-volume-up text-[#D4AF37]';
                    }).catch(e => {
                        console.log("Auto-play audio diblokir", e);
                        isMuted = true;
                        bgmPlayer.muted = true;
                        muteIcon.className = 'fas fa-volume-mute text-gray-500';
                    });
                }
            }
        }

        // Listener ditambahkan baik untuk klik maupun sentuhan layar (Touch) di HP
        document.body.addEventListener('click', initAudioOnFirstInteraction, { once: true });
        document.body.addEventListener('touchstart', initAudioOnFirstInteraction, { once: true });

        btnMute.addEventListener('click', (e) => {
            e.stopPropagation(); // Mencegah konflik dengan sentuhan layar pertama
            isMuted = !isMuted;
            bgmPlayer.muted = isMuted;
            if (isMuted) {
                muteIcon.className = 'fas fa-volume-mute text-gray-500';
            } else {
                muteIcon.className = 'fas fa-volume-up text-[#D4AF37]';
                if (bgmPlayer.paused) {
                    bgmPlayer.play().catch(e => console.log("Gagal memutar audio:", e));
                    isAudioInitiated = true;
                }
            }
        });

        // ==========================================
        // KOMPONEN OVERLAY DAFTAR ISI (KEMBALI KE HAL 4)
        // ==========================================
        function createTocOverlay() {
            const overlay = document.createElement('div');
            overlay.className = 'absolute inset-0 z-[60] flex flex-col items-center justify-center p-4 pointer-events-none';
            
            overlay.innerHTML = `
                <div class="w-full max-w-md px-6 py-8 mt-8 sm:mt-16 bg-black bg-opacity-60 backdrop-blur-md rounded-2xl border border-[#8B0000] shadow-2xl pointer-events-auto">
                    <h2 class="text-3xl font-serif text-[#D4AF37] mb-6 text-center border-b border-[#8B0000] pb-3 uppercase tracking-widest">Daftar Isi</h2>
                    <div class="flex flex-col space-y-4 font-serif text-lg">
                        <button onclick="goToLeaf(0)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Cover</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 1</span>
                        </button>
                        <button onclick="goToLeaf(3)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Sambutan</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 6</span>
                        </button>
                        <button onclick="goToLeaf(4)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Teachers</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 8</span>
                        </button>
                        <button onclick="goToLeaf(10)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Committee</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 20</span>
                        </button>
                        <button onclick="goToLeaf(11)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Kelas VI-A</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 22</span>
                        </button>
                        <button onclick="goToLeaf(18)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Kelas VI-B</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 36</span>
                        </button>
                        <button onclick="goToLeaf(25)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Kelas VI-C</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 50</span>
                        </button>
                        <button onclick="goToLeaf(32)" class="flex justify-between items-center text-gray-300 hover:text-[#D4AF37] transition group border-b border-gray-800 pb-2">
                            <span class="tracking-wide">Sponsorships</span>
                            <span class="text-sm text-gray-500 group-hover:text-[#D4AF37]">Page 64</span>
                        </button>
                    </div>
                </div>
            `;

            // Cegah klik pada tombol agar tidak mengaktifkan balik/maju halaman
            const buttons = overlay.querySelectorAll('button');
            buttons.forEach(btn => {
                btn.addEventListener('click', (e) => e.stopPropagation());
                btn.addEventListener('mousedown', (e) => e.stopPropagation());
                btn.addEventListener('touchstart', (e) => e.stopPropagation());
            });

            return overlay;
        }

        function buildFlipbookDOM() {
            bookEl.innerHTML = '';
            
            for (let i = 0; i < totalLeaves; i++) {
                const leaf = document.createElement('div');
                leaf.className = 'leaf';
                leaf.dataset.index = i;

                const frontPageNum = (i * 2) + 1;
                const backPageNum = (i * 2) + 2;

                const frontFace = document.createElement('div');
                frontFace.className = 'face front';
                
                const frontImg = document.createElement('img');
                frontImg.dataset.src = IMG_FOLDER + getPageFilename(frontPageNum);
                frontImg.alt = `Page ${frontPageNum}`;
                frontImg.className = 'page-img';
                frontFace.appendChild(frontImg);

                if (frontPageNum === 4) { frontFace.appendChild(createTocOverlay()); }
                frontFace.addEventListener('click', () => { if(!hasDragged && !isMagnifierMode) turnNext(); });

                const backFace = document.createElement('div');
                backFace.className = 'face back';
                
                if (backPageNum <= TOTAL_PAGES) {
                    const backImg = document.createElement('img');
                    backImg.dataset.src = IMG_FOLDER + getPageFilename(backPageNum);
                    backImg.alt = `Page ${backPageNum}`;
                    backImg.className = 'page-img';
                    backFace.appendChild(backImg);
                } else {
                    backFace.style.backgroundColor = '#111827'; 
                }

                if (backPageNum === 4) { backFace.appendChild(createTocOverlay()); }
                backFace.addEventListener('click', () => { if(!hasDragged && !isMagnifierMode) turnPrev(); });

                leaf.appendChild(frontFace);
                leaf.appendChild(backFace);
                bookEl.appendChild(leaf);
            }

            updateLeavesVisibility();
            updateZIndexes();
            updateControls();
            loadVisibleImages(); 
        }

        function updateLeavesVisibility() {
            const leaves = document.querySelectorAll('.leaf');
            leaves.forEach((leaf, index) => {
                if (index >= currentLeaf - 2 && index <= currentLeaf + 1) {
                    leaf.style.display = 'block';
                } else {
                    leaf.style.display = 'none'; 
                }
            });
        }

        function loadVisibleImages() {
            const leavesToLoad = [currentLeaf - 1, currentLeaf, currentLeaf + 1, currentLeaf + 2];
            leavesToLoad.forEach(idx => {
                if (idx >= 0 && idx < totalLeaves) {
                    const leaf = document.querySelector(`.leaf[data-index="${idx}"]`);
                    if (leaf) {
                        const imgs = leaf.querySelectorAll('img.page-img');
                        imgs.forEach(img => {
                            if (img.dataset.src) {
                                img.src = img.dataset.src;
                                img.removeAttribute('data-src'); 
                            }
                        });
                    }
                }
            });
        }

        function updateZIndexes() {
            const leaves = document.querySelectorAll('.leaf');
            leaves.forEach((leaf, index) => {
                if (index < currentLeaf) leaf.style.zIndex = index + 1;
                else leaf.style.zIndex = totalLeaves - index;
            });
        }
        
        function updatePageIndicator() {
            let leftPage = currentLeaf * 2;
            let rightPage = currentLeaf * 2 + 1;
            let activeSection = "Cover";

            if (currentLeaf === totalLeaves) {
                activeSection = "Back Cover";
            } else if (currentLeaf === 0) {
                activeSection = "Cover";
            } else {
                let exactLeftMatch = sectionMapping.find(s => s.page === leftPage);
                if (exactLeftMatch) {
                    activeSection = exactLeftMatch.name;
                } else {
                    for (let i = 0; i < sectionMapping.length; i++) {
                        if (sectionMapping[i].page <= rightPage) {
                            activeSection = sectionMapping[i].name;
                        }
                    }
                }
            }
            
            pageNameIndicator.style.opacity = 0;
            setTimeout(() => {
                pageNameIndicator.innerText = activeSection;
                pageNameIndicator.style.opacity = 1;
            }, 150);
        }

        function updateControls() {
            btnPrev.disabled = currentLeaf === 0;
            btnNext.disabled = currentLeaf === totalLeaves;
            
            sidePrev.style.display = currentLeaf === 0 ? 'none' : 'block';
            sideNext.style.display = currentLeaf === totalLeaves ? 'none' : 'block';
            
            const leftPage = currentLeaf * 2;
            pageInput.value = leftPage === 0 ? 1 : leftPage;

            const maxThickness = 25;
            const rightRatio = (totalLeaves - currentLeaf) / totalLeaves;
            const leftRatio = currentLeaf / totalLeaves;

            thicknessRight.style.width = `${Math.max(1, rightRatio * maxThickness)}px`;
            thicknessLeft.style.width = `${Math.max(0, leftRatio * maxThickness)}px`;
            
            shadowLeft.style.width = currentLeaf === 0 ? '0%' : '45%';
            shadowLeft.style.opacity = currentLeaf === 0 ? '0' : '1';
            thicknessLeft.style.display = currentLeaf === 0 ? 'none' : 'block';

            shadowRight.style.width = currentLeaf === totalLeaves ? '0%' : '45%';
            shadowRight.style.opacity = currentLeaf === totalLeaves ? '0' : '1';
            thicknessRight.style.display = currentLeaf === totalLeaves ? 'none' : 'block';
            
            updatePageIndicator(); 
        }

        btnHomeFlip.addEventListener('click', () => goToLeaf(0));

        function goToLeaf(target) {
            if (target < 0) target = 0;
            if (target > totalLeaves) target = totalLeaves;
            if (target === currentLeaf) return;

            const leaves = document.querySelectorAll('.leaf');
            leaves.forEach((leaf, index) => {
                if (index < target) leaf.classList.add('flipped');
                else leaf.classList.remove('flipped');
            });
            
            currentLeaf = target;
            updateLeavesVisibility(); 
            updateZIndexes();
            updateControls();
            loadVisibleImages(); 
            playFlipSound();
            
            if (isAutoPlaying) toggleAutoPlay();
        }

        function turnNext() {
            if (isFlipping || currentLeaf >= totalLeaves) {
                if (isAutoPlaying && currentLeaf >= totalLeaves) toggleAutoPlay();
                return;
            }
            isFlipping = true;
            playFlipSound();

            const leafToFlip = document.querySelector(`.leaf[data-index="${currentLeaf}"]`);
            if (leafToFlip) {
                const nextLeaf = document.querySelector(`.leaf[data-index="${currentLeaf + 1}"]`);
                if(nextLeaf) nextLeaf.style.display = 'block';

                leafToFlip.classList.add('is-turning');
                leafToFlip.classList.add('flipped');
                currentLeaf++;
                
                updateZIndexes();
                updateControls();
                loadVisibleImages(); 
                
                setTimeout(() => {
                    leafToFlip.classList.remove('is-turning');
                    isFlipping = false;
                    updateLeavesVisibility(); 
                }, 800); 
            }
        }

        function turnPrev() {
            if (isFlipping || currentLeaf <= 0) return;
            isFlipping = true;
            playFlipSound();

            currentLeaf--;
            const leafToFlip = document.querySelector(`.leaf[data-index="${currentLeaf}"]`);
            if (leafToFlip) {
                const prevLeaf = document.querySelector(`.leaf[data-index="${currentLeaf - 2}"]`);
                if(prevLeaf) prevLeaf.style.display = 'block';

                leafToFlip.classList.add('is-turning');
                leafToFlip.classList.remove('flipped');
                
                updateZIndexes();
                updateControls();
                loadVisibleImages(); 

                setTimeout(() => {
                    leafToFlip.classList.remove('is-turning');
                    isFlipping = false;
                    updateLeavesVisibility(); 
                }, 800);
            }
        }

        btnSoundMenu.addEventListener('click', () => { soundSettingsPanel.classList.toggle('hidden'); closeOtherPanels('sound'); });
        btnCloseSoundSettings.addEventListener('click', () => soundSettingsPanel.classList.add('hidden'));

        sfxSlider.addEventListener('input', (e) => {
            sfxVolume = parseFloat(e.target.value);
            sfxIcon.className = sfxVolume === 0 ? 'fas fa-volume-mute text-gray-500' : 'fas fa-volume-up text-[#D4AF37]';
        });

        bgmSlider.addEventListener('input', (e) => {
            bgmVolume = parseFloat(e.target.value);
            bgmPlayer.volume = bgmVolume;
            bgmIcon.className = bgmVolume === 0 ? 'fas fa-volume-mute text-gray-500' : 'fas fa-volume-up text-[#D4AF37]';
            if (bgmVolume > 0 && bgmPlayer.paused && isAudioInitiated && !isMuted) bgmPlayer.play();
        });

        if(bgmSelect) {
            bgmSelect.addEventListener('change', (e) => {
                bgmPlayer.src = e.target.value;
                bgmPlayer.load(); // Paksa browser membaca ulang file baru
                // Jika sebelumnya lagu sedang menyala, langsung putar lagu yang baru dipilih
                if (!bgmPlayer.paused || isAudioInitiated) {
                    bgmPlayer.play().catch(err => console.log("Pemutaran lagu terblokir:", err));
                    isMuted = false;
                    bgmPlayer.muted = false;
                    muteIcon.className = 'fas fa-volume-up text-[#D4AF37]';
                }
            });
        }

        function playFlipSound() {
            if (sfxVolume === 0) return;
            try {
                // Reset ke detik 0 agar suara tidak bertumpuk jika membalik halaman dengan cepat
                sfxPlayer.currentTime = 0; 
                sfxPlayer.volume = sfxVolume;
                let playPromise = sfxPlayer.play();
                if (playPromise !== undefined) {
                    playPromise.catch(err => console.log("SFX belum bisa diputar (menunggu interaksi sentuhan):", err));
                }
            } catch(e) {}
        }

        function toggleAutoPlay() {
            if (isAutoPlaying) {
                clearInterval(autoPlayInterval);
                isAutoPlaying = false;
                autoplayIcon.className = 'fas fa-play';
                btnAutoPlay.classList.remove('text-[#8B0000]');
                btnAutoPlay.classList.add('text-[#D4AF37]');
            } else {
                if (currentLeaf >= totalLeaves) goToLeaf(0);
                isAutoPlaying = true;
                autoplayIcon.className = 'fas fa-pause';
                btnAutoPlay.classList.remove('text-[#D4AF37]');
                btnAutoPlay.classList.add('text-[#8B0000]');
                
                autoPlayInterval = setInterval(() => {
                    if (currentLeaf >= totalLeaves) toggleAutoPlay(); 
                    else turnNext();
                }, 3500);
            }
        }
        btnAutoPlay.addEventListener('click', toggleAutoPlay);

        btnMagnifier.addEventListener('click', () => {
            isMagnifierMode = !isMagnifierMode;
            if (isMagnifierMode) {
                btnMagnifier.classList.replace('text-[#D4AF37]', 'text-white');
                btnMagnifier.classList.add('bg-[#8B0000]');
                flipbookWrapper.classList.add('magnifier-active');
            } else {
                btnMagnifier.classList.remove('bg-[#8B0000]', 'text-white');
                btnMagnifier.classList.add('text-[#D4AF37]');
                flipbookWrapper.classList.remove('magnifier-active');
                magnifierLens.style.display = 'none';
            }
        });

        function handleMagnifier(e) {
            if (!isMagnifierMode) return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const target = document.elementFromPoint(clientX, clientY);
            
            let imgElement = null;
            if (target) {
                if (target.tagName === 'IMG' && target.classList.contains('page-img')) {
                    imgElement = target;
                } else if (target.classList.contains('face')) {
                    imgElement = target.querySelector('img.page-img');
                } else if (target.closest('.face')) {
                    imgElement = target.closest('.face').querySelector('img.page-img');
                }
            }

            if (imgElement && imgElement.src) {
                magnifierLens.style.display = 'block';
                magnifierLens.style.left = clientX + 'px';
                magnifierLens.style.top = clientY + 'px';

                const rect = imgElement.getBoundingClientRect();
                const x = clientX - rect.left;
                const y = clientY - rect.top;

                magnifierLens.style.backgroundImage = `url('${imgElement.src}')`;
                
                const zoomFactor = 2.5; 
                magnifierLens.style.backgroundSize = `${rect.width * zoomFactor}px ${rect.height * zoomFactor}px`;
                
                const bgPosX = (x * zoomFactor) - (300 / 2); 
                const bgPosY = (y * zoomFactor) - (300 / 2);
                magnifierLens.style.backgroundPosition = `-${bgPosX}px -${bgPosY}px`;

            } else {
                magnifierLens.style.display = 'none';
            }
        }

        let magnifierTicking = false;
        function onMagnifierMove(e) {
            if (!isMagnifierMode) return;
            if (!magnifierTicking) {
                window.requestAnimationFrame(() => {
                    handleMagnifier(e);
                    magnifierTicking = false;
                });
                magnifierTicking = true;
            }
        }

        flipbookWrapper.addEventListener('mousemove', onMagnifierMove);
        flipbookWrapper.addEventListener('touchmove', onMagnifierMove, { passive: true });
        flipbookWrapper.addEventListener('mouseleave', () => magnifierLens.style.display = 'none');
        flipbookWrapper.addEventListener('touchend', () => magnifierLens.style.display = 'none');

        const bgTextures = {
            'geometric': `url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%238B0000' fill-opacity='0.15' fill-rule='evenodd'/%3E%3C/svg%3E")`,
            'dots': `url("data:image/svg+xml,%3Csvg width='20' height='20' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='2' cy='2' r='2' fill='%238B0000' fill-opacity='0.2'/%3E%3C/svg%3E")`,
            'grid': `url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 0L0 0 0 40' fill='none' stroke='%238B0000' stroke-width='1' stroke-opacity='0.2'/%3E%3C/svg%3E")`,
            'none': 'none'
        };

        function closeOtherPanels(except) {
            if (except !== 'theme') bgSettingsPanel.classList.add('hidden');
            if (except !== 'sound') soundSettingsPanel.classList.add('hidden');
            if (except !== 'thumb') thumbnailDrawer.classList.add('hidden');
            if (except !== 'toc' && !tocSidebar.classList.contains('-translate-x-full')) toggleToc();
        }

        btnTheme.addEventListener('click', () => { bgSettingsPanel.classList.toggle('hidden'); closeOtherPanels('theme'); });
        btnCloseBgSettings.addEventListener('click', () => { bgSettingsPanel.classList.add('hidden'); });

        bgColorPicker.addEventListener('input', (e) => {
            document.body.style.backgroundColor = e.target.value;
            bgColorHex.innerText = e.target.value;
        });

        textureBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                textureBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.body.style.backgroundImage = bgTextures[btn.getAttribute('data-texture')];
            });
        });

        function toggleToolbar() {
            isToolbarVisible = !isToolbarVisible;
            if (isToolbarVisible) {
                mainToolbar.classList.remove('toolbar-hidden');
                btnShowToolbar.classList.add('hidden');
                btnTocOpen.classList.remove('opacity-0', 'pointer-events-none');
                pageNameIndicator.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                mainToolbar.classList.add('toolbar-hidden');
                btnShowToolbar.classList.remove('hidden');
                btnTocOpen.classList.add('opacity-0', 'pointer-events-none');
                pageNameIndicator.classList.add('opacity-0', 'pointer-events-none');
                closeOtherPanels('none'); 
            }
            updateBookSize();
        }

        btnHideToolbar.addEventListener('click', toggleToolbar);
        btnShowToolbar.addEventListener('click', toggleToolbar);

        flipbookWrapper.addEventListener('click', (e) => {
            if (!hasDragged && !isMagnifierMode && (e.target === flipbookWrapper || e.target === bookZoomWrapper || e.target === bookContainer)) {
                toggleToolbar();
            }
        });

        function updateBookSize() {
            if (!bookContainer.style.aspectRatio) return;
            const ratioVal = parseFloat(bookContainer.style.aspectRatio);
            const screenRatio = window.innerWidth / window.innerHeight;
            
            let maxHeight = isToolbarVisible ? 82 : 95;
            if (screenRatio > ratioVal) {
                bookContainer.style.height = `${maxHeight}dvh`;
                bookContainer.style.width = `calc(${maxHeight}dvh * ${ratioVal})`;
            } else {
                bookContainer.style.width = '98vw';
                bookContainer.style.height = `calc(98vw / ${ratioVal})`;
            }
        }

        pageInput.addEventListener('change', (e) => {
            let targetPage = parseInt(e.target.value);
            if (!isNaN(targetPage) && targetPage >= 1 && targetPage <= TOTAL_PAGES) {
                goToLeaf(Math.floor(targetPage / 2));
            } else { updateControls(); }
        });

        btnThumbnails.addEventListener('click', () => { 
            thumbnailDrawer.classList.toggle('hidden'); 
            closeOtherPanels('thumb');
            if (thumbnailContainer.innerHTML.trim() === '') generateThumbnails();
        });
        
        btnCloseThumbnails.addEventListener('click', () => thumbnailDrawer.classList.add('hidden'));

        function generateThumbnails() {
            thumbnailContainer.innerHTML = ''; 
            for (let i = 1; i <= TOTAL_PAGES; i+=2) {
                const wrapper = document.createElement('div');
                wrapper.className = 'flex-shrink-0 cursor-pointer group flex flex-col items-center space-y-2 hover:-translate-y-2 transition transform duration-200';
                wrapper.onclick = () => {
                    goToLeaf(Math.floor(i / 2));
                    thumbnailDrawer.classList.add('hidden');
                };
                
                const img = document.createElement('img');
                img.className = 'thumb-img rounded border border-[#8B0000] shadow-md group-hover:border-[#D4AF37] transition';
                img.loading = "lazy";
                img.src = IMG_FOLDER + getPageFilename(i);
                
                const label = document.createElement('span');
                label.className = 'text-xs text-gray-400 group-hover:text-[#D4AF37] font-mono font-bold';
                label.innerText = `Hal ${i}`;

                wrapper.appendChild(img);
                wrapper.appendChild(label);
                thumbnailContainer.appendChild(wrapper);
            }
        }

        let transformTicking = false;
        
        function applyTransform() {
            if (!transformTicking) {
                window.requestAnimationFrame(() => {
                    currentZoom = Math.round(currentZoom * 100) / 100;
                    bookZoomWrapper.style.transform = `translate(${translateX}px, ${translateY}px) scale(${currentZoom})`;
                    if(zoomIndicator) zoomIndicator.innerText = `${Math.round(currentZoom * 100)}%`;
                    
                    if (currentZoom > 1.0) flipbookWrapper.classList.add('can-pan');
                    else flipbookWrapper.classList.remove('can-pan');
                    
                    if (currentZoom !== 1.0 || translateX !== 0 || translateY !== 0) {
                        btnResetView.classList.remove('opacity-0', 'pointer-events-none', '-translate-y-5');
                        btnResetView.classList.add('opacity-100', 'translate-y-0');
                    } else {
                        btnResetView.classList.remove('opacity-100', 'translate-y-0');
                        btnResetView.classList.add('opacity-0', 'pointer-events-none', '-translate-y-5');
                    }
                    transformTicking = false;
                });
                transformTicking = true;
            }
        }

        function resetTransform() {
            currentZoom = 1.0;
            translateX = 0; translateY = 0;
            bookZoomWrapper.style.transition = 'transform 0.3s ease-out';
            applyTransform();
            setTimeout(() => { bookZoomWrapper.style.transition = ''; }, 300);
        }

        btnResetView.addEventListener('click', resetTransform);

        const btnZoomIn = document.getElementById('btn-zoom-in');
        const btnZoomOut = document.getElementById('btn-zoom-out');

        if(btnZoomIn) btnZoomIn.addEventListener('click', () => { if (currentZoom < MAX_ZOOM) { currentZoom += ZOOM_STEP; applyTransform(); }});
        if(btnZoomOut) btnZoomOut.addEventListener('click', () => { if (currentZoom > MIN_ZOOM) { currentZoom -= ZOOM_STEP; applyTransform(); } if (currentZoom <= 1.0) resetTransform();});

        flipbookWrapper.addEventListener('wheel', (e) => {
            if (isMagnifierMode) return; 
            e.preventDefault(); 
            if (e.deltaY < 0 && currentZoom < MAX_ZOOM) currentZoom += ZOOM_STEP;
            else if (e.deltaY > 0 && currentZoom > MIN_ZOOM) currentZoom -= ZOOM_STEP;
            
            if (currentZoom < MIN_ZOOM) currentZoom = MIN_ZOOM;
            if (currentZoom <= 1.0) resetTransform();
            else applyTransform();
        }, { passive: false });

        let touchStartX = null;
        let initialPinchDistance = null;
        let initialZoom = 1.0;
        let lastTapTime = 0;

        flipbookWrapper.addEventListener('touchstart', (e) => {
            if (isMagnifierMode || e.target.closest('.floating-toolbar') || e.target.closest('button') || e.target.closest('#thumbnail-drawer') || e.target.closest('.absolute.bottom-24') || e.target.closest('#toc-sidebar') || e.target.closest('a')) return;
            
            if (e.touches.length === 1) {
                if (currentZoom > 1.0) {
                    isPanning = true;
                    hasDragged = false;
                    bookZoomWrapper.classList.add('dragging');
                    startX = e.touches[0].clientX - translateX;
                    startY = e.touches[0].clientY - translateY;
                } else {
                    touchStartX = e.touches[0].clientX;
                }
            } else if (e.touches.length === 2) {
                isPanning = false;
                bookZoomWrapper.classList.add('dragging');
                initialPinchDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                initialZoom = currentZoom;
            }
        }, { passive: false });

        flipbookWrapper.addEventListener('touchmove', (e) => {
            if (isMagnifierMode) return;
            
            if (e.touches.length === 1 && isPanning) {
                e.preventDefault(); 
                hasDragged = true;
                translateX = e.touches[0].clientX - startX;
                translateY = e.touches[0].clientY - startY;
                applyTransform();
            } else if (e.touches.length === 2 && initialPinchDistance) {
                e.preventDefault(); 
                const currentDistance = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const scale = currentDistance / initialPinchDistance;
                currentZoom = Math.min(Math.max(MIN_ZOOM, initialZoom * scale), MAX_ZOOM);
                applyTransform();
            }
        }, { passive: false });

        flipbookWrapper.addEventListener('touchend', (e) => {
            if (isMagnifierMode) return;
            
            if (isPanning || initialPinchDistance) {
                isPanning = false;
                bookZoomWrapper.classList.remove('dragging');
                setTimeout(() => hasDragged = false, 50);
            }
            initialPinchDistance = null;

            if (currentZoom <= 1.0 && touchStartX !== null && e.changedTouches.length === 1) {
                let dx = touchStartX - e.changedTouches[0].clientX;
                if (dx > 50) { turnNext(); touchStartX = null; } 
                else if (dx < -50) { turnPrev(); touchStartX = null; }
            }

            if (e.target.closest('a')) return;
            const currentTime = new Date().getTime();
            const tapLength = currentTime - lastTapTime;
            
            if (tapLength < 300 && tapLength > 0 && !hasDragged) {
                if (currentZoom === 1.0) {
                    currentZoom = 2.0;
                    applyTransform();
                } else {
                    resetTransform(); 
                }
                e.preventDefault();
            }
            lastTapTime = currentTime;
        });

        flipbookWrapper.addEventListener('mousedown', (e) => {
            if (isMagnifierMode) return;
            if (currentZoom > 1.0 && !e.target.closest('button') && !e.target.closest('.side-btn') && !e.target.closest('.floating-toolbar') && !e.target.closest('a')) {
                isPanning = true;
                hasDragged = false; 
                flipbookWrapper.classList.add('is-panning');
                bookZoomWrapper.classList.add('dragging');
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            if (Math.abs(e.clientX - startX - translateX) > 5 || Math.abs(e.clientY - startY - translateY) > 5) {
                hasDragged = true;
            }
            translateX = e.clientX - startX;
            translateY = e.clientY - startY;
            applyTransform();
        });

        window.addEventListener('mouseup', () => {
            if (isPanning) {
                isPanning = false;
                flipbookWrapper.classList.remove('is-panning');
                bookZoomWrapper.classList.remove('dragging');
                setTimeout(() => hasDragged = false, 50); 
            }
        });
        
        window.addEventListener('mouseleave', () => {
            if (isPanning) {
                isPanning = false;
                flipbookWrapper.classList.remove('is-panning');
                bookZoomWrapper.classList.remove('dragging');
            }
        });

        document.addEventListener('keydown', (e) => {
            if (flipbookWrapper.classList.contains('hidden')) return;
            if (e.key === 'ArrowRight') { e.preventDefault(); turnNext(); }
            if (e.key === 'ArrowLeft') { e.preventDefault(); turnPrev(); }
        });

        btnPrev.addEventListener('click', turnPrev);
        btnNext.addEventListener('click', turnNext);

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(err => {});
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        document.addEventListener('fullscreenchange', () => {
            const icons = document.querySelectorAll('.fs-icon');
            icons.forEach(icon => { icon.className = !document.fullscreenElement ? 'fas fa-expand fs-icon' : 'fas fa-compress fs-icon'; });
        });

        window.addEventListener('resize', () => { updateBookSize(); });

    </script>
</body>
</html>
